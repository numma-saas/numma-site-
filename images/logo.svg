<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="NUMMA — logiciel de gestion tout-en-un">
  <defs>
    <!-- Gradient for left vertical bar : deep blue → purple -->
    <linearGradient id="numma-left" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="55%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#FB923C"/>
    </linearGradient>
    <!-- Gradient for right vertical bar : purple → lavender -->
    <linearGradient id="numma-right" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <!-- Gradient for diagonal ribbon : peach → lavender -->
    <linearGradient id="numma-diag" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="35%" stop-color="#F472B6"/>
      <stop offset="75%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Soft highlight overlay -->
    <linearGradient id="numma-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Diagonal "ribbon" behind, layered first for depth -->
  <path d="M22 30 Q28 28 36 42 L66 80 Q70 86 76 84 L76 86 Q72 88 66 84 L26 30 Z"
        fill="url(#numma-diag)" opacity="0.85"/>

  <!-- Left vertical bar (rounded ends) -->
  <rect x="20" y="18" width="20" height="64" rx="10" fill="url(#numma-left)"/>

  <!-- Right vertical bar (rounded ends) -->
  <rect x="60" y="18" width="20" height="64" rx="10" fill="url(#numma-right)"/>

  <!-- Diagonal stroke connecting them, layered on top -->
  <path d="M30 28 Q34 24 42 32 L72 70 Q76 74 74 78 L70 80 Q66 80 62 74 L34 38 Q30 34 26 36 Z"
        fill="url(#numma-diag)"/>

  <!-- Bottom-left peach accent (inside left bar) -->
  <path d="M20 60 Q22 56 28 56 L36 56 Q38 70 30 78 L22 78 Q18 78 18 74 Z"
        fill="#FDBA74" opacity="0.7"/>

  <!-- Subtle white highlight on top of left bar -->
  <rect x="20" y="18" width="20" height="22" rx="10" fill="url(#numma-glow)"/>

  <!-- Subtle white highlight on top of right bar -->
  <rect x="60" y="18" width="20" height="22" rx="10" fill="url(#numma-glow)"/>
</svg>
