<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-label="Tableau de bord NUMMA — vue d'accueil avec CA, trésorerie, factures impayées et factures récentes">
  <title>Tableau de bord NUMMA — Accueil</title>
  <desc>Capture d'écran du logiciel NUMMA : vue d'accueil du tableau de bord comptabilité, avec indicateurs de chiffre d'affaires, trésorerie, factures impayées et liste des dernières factures.</desc>
  <defs>
