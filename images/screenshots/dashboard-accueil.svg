  <text x="620" y="584" font-size="10" font-weight="700" class="text-light app" letter-spacing="0.4">MONTANT</text>
  <text x="740" y="584" font-size="10" font-weight="700" class="text-light app" letter-spacing="0.4">STATUT</text>
