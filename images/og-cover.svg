<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B1E6D"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="950" cy="180" r="280" fill="url(#glow)"/>
  <circle cx="200" cy="500" r="220" fill="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(80,80)">
    <rect width="88" height="88" rx="22" fill="#FFFFFF" opacity="0.18"/>
    <path d="M20 68 V24 C20 20 23 19 26 22 L62 58 C64 60 66 59 66 56 V22" stroke="#FFFFFF" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <text x="200" y="140" font-family="Inter, sans-serif" font-size="42" font-weight="800" fill="#FFFFFF" letter-spacing="-1">NUMMA</text>

  <!-- Headline -->
  <text x="80" y="300" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2.5">La gestion de votre</text>
  <text x="80" y="380" font-family="Inter, sans-serif" font-size="72" font-weight="800" fill="#FFFFFF" letter-spacing="-2.5">entreprise, simplifiée.</text>

  <!-- Subheadline -->
  <text x="80" y="450" font-family="Inter, sans-serif" font-size="28" font-weight="500" fill="#DDD6FE" letter-spacing="-0.5">Compta · Facturation électronique · Paie · Trésorerie</text>

  <!-- Chips -->
  <g transform="translate(80,510)">
    <rect width="260" height="52" rx="26" fill="#FFFFFF" opacity="0.15"/>
    <text x="130" y="34" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓ Conforme réforme 2026</text>
  </g>
  <g transform="translate(360,510)">
    <rect width="220" height="52" rx="26" fill="#FFFFFF" opacity="0.15"/>
    <text x="110" y="34" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓ Hébergé en France</text>
  </g>
  <g transform="translate(600,510)">
    <rect width="200" height="52" rx="26" fill="#FFFFFF" opacity="0.15"/>
    <text x="100" y="34" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">✓ Essai 14j gratuit</text>
  </g>

  <!-- URL -->
  <text x="1120" y="600" font-family="Inter, sans-serif" font-size="22" font-weight="600" fill="#FFFFFF" text-anchor="end" opacity="0.8">www.numma.eu</text>
</svg>
